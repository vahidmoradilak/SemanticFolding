# ============================================================
# NOTES
# ============================================================
# Grid Size Recommendations:
#   16  → Fast prototyping, small corpora  (< 1K docs)
#   32  → Balanced quality, medium corpora (1K–10K docs)
#   64  → High precision, large corpora    (> 10K docs)
#
# spreading_steps Guidelines (Phase 6):
#   0   → Exact cell matching (high precision, low recall)
#   1   → Moderate context expansion (balanced) ← default
#   2–3 → Aggressive expansion (high recall, lower precision)
#
# top_percent Guidelines (Phase 5):
#   0.03–0.05 → Sparse, distinctive fingerprints
#   0.05–0.10 → Balanced representation
#   0.10–0.20 → Dense, comprehensive coverage
#
# Memory Considerations:
#   Grid 16 → ~256  cells, minimal memory
#   Grid 32 → ~1024 cells, moderate memory
#   Grid 64 → ~4096 cells, high memory usage
#
# Removed from Phase 6 (handled internally or not used by new CLI):
#   weighting, normalization, spreading.radius, spreading.decay,
#   spreading.normalize_after, min_similarity, use_batch,
#   verbose, output_json, max_ngram, min_word_length
